<!doctype html>
<html>
  <head>
    <title>BookBrief AI</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter";
        background: #fdfaf6;
        margin: 0;
      }
      .container {
        max-width: 900px;
        margin: auto;
        padding: 30px;
      }

      h1 {
        text-align: center;
        font-family: "Playfair Display";
      }
      .tagline {
        text-align: center;
        font-style: italic;
      }

      .dropzone {
        border: 2px dashed #d4a373;
        padding: 30px;
        text-align: center;
        border-radius: 10px;
        cursor: pointer;
      }

      .file-name {
        text-align: center;
        margin-top: 10px;
        font-weight: bold;
      }

      button {
        background: #d4a373;
        color: white;
        border: none;
        padding: 10px;
        margin: 5px;
        border-radius: 6px;
        cursor: pointer;
      }

      .card {
        background: white;
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
      }
      .summary {
        max-height: 250px;
        overflow: auto;
      }

      .history-item {
        display: flex;
        justify-content: space-between;
        padding: 8px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📚 BookBrief AI</h1>
      <div class="tagline">✨ Transform documents into meaningful insights</div>

      <div class="dropzone" onclick="fileInput.click()">
        Click here to upload file
        <input type="file" id="fileInput" hidden />
      </div>

      <div class="file-name" id="fileName">No file selected</div>

      <div style="text-align: center">
        <button onclick="upload()">Generate Summary</button>
        <button onclick="resetView()">Reset View</button>
        <button onclick="downloadCurrent()">Download Summary</button>
        <button onclick="toggleHistory()">History</button>
      </div>

      <div id="status" style="text-align: center"></div>

      <div class="card">
        <h3>Summary</h3>
        <div id="summary" class="summary"></div>
      </div>

      <div id="historySection" class="card" style="display: none">
        <h3>History</h3>
        <button onclick="deleteAll()">Clear All</button>
        <div id="history"></div>
      </div>
    </div>

    <script>
      let currentSummary = "";
      let currentFileName = "";

      const fileInput = document.getElementById("fileInput");

      fileInput.addEventListener("change", () => {
        document.getElementById("fileName").innerText = fileInput.files[0].name;
      });

      function upload() {
        let file = fileInput.files[0];
        if (!file) {
          alert("Select file");
          return;
        }

        let formData = new FormData();
        formData.append("file", file);

        fetch("/upload", { method: "POST", body: formData }).then(() => poll());
      }

      function poll() {
        fetch("/get_summary")
          .then((r) => r.json())
          .then((d) => {
            if (d.status === "ready") {
              currentSummary = d.summary;
              currentFileName = d.filename;

              document.getElementById("summary").innerText = d.summary;
              renderHistory(d.history);
            } else setTimeout(poll, 2000);
          });
      }

      function resetView() {
        document.getElementById("summary").innerText = "";
        document.getElementById("fileName").innerText = "No file selected";
        fileInput.value = ""; // ✅ clears file input
        currentSummary = "";
        currentFileName = "";
      }

      function downloadCurrent() {
        if (!currentSummary) {
          alert("No summary available yet");
          return;
        }

        fetch("/download_current", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: currentSummary,
            filename: currentFileName,
          }),
        })
          .then((res) => res.blob())
          .then((blob) => {
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.href = url;
            a.download = currentFileName;
            a.click();
          });
      }

      function toggleHistory() {
        let sec = document.getElementById("historySection");
        sec.style.display = sec.style.display === "none" ? "block" : "none"; // ✅ toggle fix
      }

      function renderHistory(history) {
        let div = document.getElementById("history");
        div.innerHTML = "";

        history.forEach((item, i) => {
          div.innerHTML += `
      <div class="history-item">
        ${item.name}
        <div>
          <button onclick="download('${item.name}')">⬇️</button>
          <button onclick="deleteItem(${i})">❌</button>
        </div>
      </div>
    `;
        });
      }

      function download(name) {
        window.location.href = "/download/" + name;
      }

      function deleteItem(i) {
        fetch("/delete_history", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ index: i }),
        }).then(loadHistory);
      }

      function loadHistory() {
        fetch("/get_summary")
          .then((r) => r.json())
          .then((d) => renderHistory(d.history));
      }

      function deleteAll() {
        fetch("/delete_all_history", { method: "POST" }).then(() =>
          renderHistory([]),
        );
      }
    </script>
  </body>
</html>
